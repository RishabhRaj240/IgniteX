<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Fiery orangeŌåÆred vertical gradient for the X -->
    <linearGradient id="xFire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF8C00"/>
      <stop offset="55%"  stop-color="#E84800"/>
      <stop offset="100%" stop-color="#AA1200"/>
    </linearGradient>
    <!-- Radial glow behind the X -->
    <radialGradient id="xGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF6600" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft blur filter for glow -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="100" height="100" fill="#000000"/>

  <!-- Orange glow halo behind the X -->
  <ellipse cx="72" cy="50" rx="22" ry="28" fill="url(#xGlow)" filter="url(#glow)"/>

  <!-- "IGNITE" in bold white ŌĆö compact to fit beside X -->
  <text
    x="5" y="63"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="26"
    letter-spacing="-0.5"
    fill="#FFFFFF"
  >IGNITE</text>

  <!-- Fiery "X" ŌĆö slightly larger and higher, overlapping IGNITE edge -->
  <text
    x="60" y="70"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="url(#xFire)"
  >X</text>
</svg>